name: Update game journal

on:
  push:
    branches:
      - main
    paths:
      - "games/**"
      - "scripts/update_readme.py"
      - "scripts/build-site.py"
      - ".github/workflows/update-readme.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-journal:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the journal
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Update the README
        run: python scripts/update_readme.py

      - name: Build searchable journal data
        run: python scripts/build-site.py

      - name: Commit generated files
        run: |
          if git diff --quiet README.md docs/games.json; then
            echo "Everything is already up to date."
            exit 0
          fi

          git config user.name "rp6-journal-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md docs/games.json
          git commit -m "Update game journal"
          git push
