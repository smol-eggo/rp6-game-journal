name: Update game journal

on:
  push:
    branches:
      - main
    paths:
      - "games/**"
      - "scripts/**"
      - "docs/assets/review-pages.css"
      - ".github/workflows/update-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-game-journal
  cancel-in-progress: true

jobs:
  update-journal:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the journal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install generator dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Update the README
        run: python scripts/update_readme.py

      - name: Build the journal
        run: python scripts/build-site.py

      - name: Show generated files
        run: |
          echo "Contents of docs:"
          ls -la docs

          echo "Generated review pages:"
          find docs/reviews -name index.html | head -20

          echo "Generated game count:"
          python -c "import json; print(len(json.load(open('docs/games.json', encoding='utf-8'))))"

      - name: Commit generated files
        run: |
          git config user.name "rp6-journal-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            README.md \
            docs/games.json \
            docs/reviews \
            docs/sitemap.xml \
            docs/feed.xml \
            docs/robots.txt

          if git diff --cached --quiet; then
            echo "Everything is already up to date."
            exit 0
          fi

          git commit -m "Update game journal"
          git push
